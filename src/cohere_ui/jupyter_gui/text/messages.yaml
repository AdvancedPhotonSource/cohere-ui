# Status / log messages used across the GUI's main window and tabs.
# Grouped by area for navigation. Format strings use {placeholder}
# substitution at the call site (e.g. .format(path=...)). Edit the
# wording here without touching Python; just keep the {placeholders}
# intact so the runtime substitution still works.


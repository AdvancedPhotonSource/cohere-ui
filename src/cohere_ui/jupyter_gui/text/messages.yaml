  no_working_dir: "Please enter a working directory"
  working_dir_missing: "Parent directory does not exist: {path}"
  parent_dir_missing: "Pick a parent directory in the header first."
  no_experiment_id: "Folder name is empty; fill in the Root field or adjust the template."
  experiment_set: "Experiment set: {path}"
  experiment_loaded: "Loaded experiment: {path}"
  config_missing: "Missing conf/config file in {path}"
  config_load_error: "Error loading configs: {error}"
  experiment_dir_created: "Created experiment directory: {path}"
  conf_dir_created: "Created conf directory: {path}"
  configs_loaded: "Loaded {count} config file(s): {names}"
  configs_missing: "No configs found for: {names}"
  collision: "Experiment already exists at {path}. Pick a different folder name (change Root, Serial, or date), or switch to Load."

wizard:
  collision: "Folder exists. Change Root, Serial, or date."
  serial_bumped: "(serial bumped to {next} to avoid collision)"
  parent_dir_prompt: "Pick a parent directory above to enable Create."
  heading: "Create a new experiment"
  heading_note: "(template is shared between Load and Create; edit either)"
  mode_section: "Mode"
  serial_hint: "integer (auto-bumps for uniqueness) or scan range like 2-7,10-15"
  layout_preview_heading: "Files and folders that will be created:"
  unknown_tokens: "Unknown template tokens ignored: {names}. Supported: {{root}}, {{serial}}, {{date}}."
  scan_unparseable: "Serial value is not a parseable scan range; layout preview hidden."

# Header experiment-picker labels and empty-list hints.
picker:
  parent_section: "Parent directory"
  parent_section_note: "(contains experiment folders)"
  template_section: "Folder-name template"
  template_section_note: "(saved per parent dir)"
  template_saved_hint: "Saved automatically per parent directory."
  empty_no_parent: "Pick a parent directory above."
  empty_no_subdirs: "No subdirectories under this parent."
  empty_no_matches: "No matches. Try \"Show non-experiment subdirs\" or switch to Create new."
  path_mirror_empty: "(no directory selected)"

# Tooltips rendered as title-attribute text on hover over header
# controls (wizard mode buttons, template field, form-row labels).
tooltip:
  single: >-
    Single-experiment mode. Treats the scan input as one unit and
    produces a single reconstruction at the experiment root (no
    scan_*/ or mp_*/ subdirs).
  multipeak: >-
    Multi-peak mode. Use when one experiment captures multiple Bragg peaks
    of the same crystal (each peak has its own scan range and HKL). Prep
    writes one mp_<scan>_<hkl>/ subdir per peak, and reconstruction couples
    all peaks into one shared image. REQUIRES the Multi-peak tab to be
    populated and Saved before Prepare, or prep will fail with a missing
    config_mp error.
  separate_scans: >-
    Separate-scans mode. Treats each scan in your Scan(s) range as an
    independent experiment: prep writes one scan_<N>/ subdir per scan
    (no alignment between them), and each is reconstructed independently.
    For scan="2-7" you'll end up with scan_2/ through scan_7/, each with
    its own results_phasing/image.npy.
  separate_scan_ranges: >-
    Separate-scan-ranges mode. Each comma-separated range becomes one
    scan_<range>/ subdir; scans WITHIN a range are cross-correlation
    aligned and summed before reconstruction. For scan="2-7,10-15" you'll
    get scan_2-7/ and scan_10-15/, each reconstructed separately.
  # Plain-text block; rendered verbatim inside a title= tooltip so
  # browsers preserve the column alignment.
  template_hint: |-
    Tokens
      {root}        your project root (e.g. cdi)
      {date:fmt}    strftime spec; default %Y%m%d (date only)
      {serial:fmt}  integer (auto-bumps; :03d gives 001) or
                    scan range like 2-7,10-15 (kept verbatim)

    Date format examples
      %Y%m%d         20260527
      %Y-%m-%d       2026-05-27
      %Y%m%d_%H%M    20260527_1432
      %H:%M          14:32

    Serial format examples
      :d             7
      :03d           007

